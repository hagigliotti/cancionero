<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<title>Cancionero</title>
</head>
<body>

<h1><center>🎶 Cancionero MV 🎶</center></h1>

<input id="buscador" type="text" placeholder="🔎 Buscar canción..." />
<!-- selector idioma -->
<select id="idioma" onchange="cargarIndice(); renderAlphabet();">
  <option value="es" selected>🇦🇷 Español</option>
  <option value="it">🇮🇹 Italiano</option>
  <option value="pt">🇧🇷 Portugués</option>
  <option value="en">🇬🇧 English</option>
</select>
<div id="alfabeto" class="alphabet-bar"></div>


<h2>Índice</h2>
<ul id="indice"></ul>

<hr>

<div id="contenido"></div>

<script src="app.js"></script>

</body>
</html>
